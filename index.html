<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>ATLAS // station</title>
<link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css"/>
<style>
@keyframes brth{0%,100%{opacity:.95}50%{opacity:1}}
@keyframes hd{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
html,body{margin:0;height:100%;background:#0a0908;color:#9a9286;font-family:'Berkeley Mono',ui-monospace,Consolas,monospace;overflow:hidden}
body{display:flex;flex-direction:column}
.top{display:flex;align-items:center;gap:11px;padding:8px 14px;border-bottom:1px solid #2a2620;background:#0c0a09;animation:brth 7s ease-in-out infinite;flex:none}
.nm{font-size:12px;letter-spacing:.14em;color:#e7ddcb}
.sub{font-size:9.5px;letter-spacing:.12em;color:#5e574c;text-transform:uppercase}
.dot{width:7px;height:7px;border-radius:50%;background:#5a8f6c;flex:none}
.btn{font-size:10px;letter-spacing:.1em;color:#6f685c;border:0.5px solid #322c24;padding:3px 8px;cursor:pointer;background:transparent}
.btn:hover{color:#cd5a38;border-color:#5a3a2c}
#term{flex:1;min-height:0;padding:6px 4px 4px 10px;background:#0d0b0a}
.xterm{height:100%}
</style>
</head>
<body>
  <div class="top">
    <svg width="30" height="33" viewBox="0 0 120 132" style="flex:none;transform-origin:60px 70px;animation:hd 7s ease-in-out infinite">
      <defs>
        <linearGradient id="sk" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#efe8da"/><stop offset=".45" stop-color="#bdb3a0"/><stop offset="1" stop-color="#2e2a23"/></linearGradient>
        <radialGradient id="so" cx=".5" cy=".4" r=".7"><stop offset="0" stop-color="#26221d"/><stop offset="1" stop-color="#070608"/></radialGradient>
      </defs>
      <path d="M60 6 C40 12 25 40 30 74 C33 104 48 123 60 123 C72 123 87 104 90 74 C95 40 80 12 60 6 Z" fill="url(#sk)" stroke="#9b9488" stroke-width=".8"/>
      <g stroke="#6f685c" stroke-width="1.6" fill="none" opacity=".5"><path d="M33 44 Q60 54 87 44"/><path d="M32 64 Q60 76 88 64"/><path d="M34 84 Q60 95 86 84"/></g>
      <ellipse cx="60" cy="86" rx="16" ry="12" fill="url(#so)" stroke="#3a352d" stroke-width="1"/>
      <ellipse id="glow" cx="60" cy="86" rx="14" ry="10" fill="#cd5a38" opacity=".12"/>
      <ellipse id="slit" cx="60" cy="86" rx="2.6" ry="8" fill="#cd5a38" opacity=".9"/>
    </svg>
    <div><div class="nm">ATLAS // station</div><div class="sub">claude, embedded &middot; the whole system</div></div>
    <span class="dot" id="dot" style="margin-left:auto"></span>
    <span class="btn" id="restart">restart</span>
  </div>
  <div id="term"></div>
  <script src="node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script>
  (function(){
    var slit=document.getElementById('slit'), glow=document.getElementById('glow'), dot=document.getElementById('dot');
    var theme={ background:"#0d0b0a", foreground:"#cfc6b6", cursor:"#cd5a38", cursorAccent:"#0d0b0a", selectionBackground:"#3a342b",
      black:"#26221d", red:"#cd5a38", green:"#93b094", yellow:"#bd9b3c", blue:"#6f93a6", magenta:"#b08aa0", cyan:"#8fb0a6", white:"#cfc6b6",
      brightBlack:"#6f685c", brightRed:"#e8623a", brightGreen:"#a8d8b8", brightYellow:"#e0bd5a", brightBlue:"#8fb3c4", brightMagenta:"#c79ab0", brightCyan:"#a8c8bd", brightWhite:"#efe8da" };
    var term=new Terminal({ fontFamily:"'Cascadia Code','Berkeley Mono',Consolas,monospace", fontSize:13.5, lineHeight:1.05, cursorBlink:true, allowProposedApi:true, scrollback:8000, theme:theme });
    var fit=new FitAddon.FitAddon(); term.loadAddon(fit);
    var host=document.getElementById("term");
    term.open(host);
    try{ fit.fit(); }catch(e){}
    term.onData(function(d){ window.atlas.ptyInput(d); });
    window.atlas.onPtyData(function(d){ term.write(d); });
    window.atlas.onPtyExit(function(c){ term.write("\r\n\x1b[2m[ claude exited ("+c+") — press restart ]\x1b[0m\r\n"); if(dot)dot.style.background="#cd5a38"; });
    function doFit(){ try{ fit.fit(); window.atlas.ptyResize(term.cols, term.rows); }catch(e){} }
    window.addEventListener("resize", doFit);
    try{ new ResizeObserver(doFit).observe(host); }catch(e){}
    setTimeout(doFit,60); setTimeout(function(){ doFit(); term.focus(); },240);
    host.addEventListener("mousedown", function(){ term.focus(); });
    document.getElementById("restart").addEventListener("click", function(){ window.atlas.ptyRestart(); term.reset(); if(dot)dot.style.background="#5a8f6c"; setTimeout(doFit,220); });
    var bt=0;(function loop(){ bt+=0.025; if(slit)slit.setAttribute('ry',(8+Math.sin(bt)*0.6).toFixed(2)); if(glow)glow.setAttribute('opacity',(0.12+Math.abs(Math.sin(bt*0.7))*0.06).toFixed(2)); requestAnimationFrame(loop); })();
  })();
  </script>
</body>
</html>
