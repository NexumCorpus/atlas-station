<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>ATLAS // station</title>
<style>
:root{
  --bg:#08070b; --panel:#0b0a11; --line:#1c1830;
  --cyan:#22e1ff; --mag:#ff2d95; --ember:#ff6a3d; --acid:#49ff9e; --amber:#ffc24b; --violet:#9d6bff;
  --ink:#cfd6e6; --dim:#5a5870; --voice:'Iowan Old Style',Palatino,Georgia,serif;
}
@keyframes scan{0%{background-position:0 0}100%{background-position:0 -240px}}
@keyframes drift{0%{transform:translateY(0)}100%{transform:translateY(-12px)}}
@keyframes wpulse{0%,100%{box-shadow:inset 2px 0 0 var(--cyan),inset 0 0 18px -8px var(--cyan)}50%{box-shadow:inset 2px 0 0 var(--cyan),inset 0 0 30px -6px var(--cyan)}}
@keyframes shimmer{0%{background-position:-160px 0}100%{background-position:220px 0}}
@keyframes sigp{0%,100%{opacity:.55;transform:scale(.9)}50%{opacity:1;transform:scale(1.15)}}
@keyframes flash{0%{background:rgba(73,255,158,.20)}100%{background:transparent}}
@keyframes flashf{0%{background:rgba(255,77,77,.20)}100%{background:transparent}}
@keyframes bubin{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
@keyframes hd{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:#9aa0b8;font-family:'Berkeley Mono',ui-monospace,Consolas,monospace;font-size:13px;overflow:hidden}
body{display:flex;flex-direction:column;position:relative}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:50;background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0 2px,rgba(0,0,0,.16) 2px 3px);animation:scan 9s linear infinite;opacity:.5}
body::after{content:"";position:fixed;inset:-20%;pointer-events:none;z-index:0;background:radial-gradient(60% 40% at 30% 0%,rgba(34,225,255,.06),transparent 70%),radial-gradient(50% 40% at 90% 100%,rgba(255,45,149,.05),transparent 70%);animation:drift 11s ease-in-out infinite alternate}
.dim{color:var(--dim)}.ell{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mem{display:flex;align-items:center;gap:11px;padding:8px 14px;border-bottom:1px solid var(--line);font-size:10px;letter-spacing:.16em;text-transform:uppercase;flex:none;z-index:2}
.mem .nm{color:#eaf2ff;text-shadow:0 0 8px rgba(34,225,255,.55)}
.haz{height:11px;width:34px;flex:none;background:repeating-linear-gradient(45deg,var(--amber) 0 5px,#1a1330 5px 10px);box-shadow:0 0 10px -2px var(--amber)}
#counts{margin-left:auto;color:#8f96b6}
#counts b{color:var(--cyan);text-shadow:0 0 8px rgba(34,225,255,.6);font-weight:400}
#main{flex:1;min-height:0;display:flex;z-index:1}
#convcol{flex:1.7;min-width:0;display:flex;flex-direction:column;min-height:0;border-right:1px solid var(--line)}
#fleetcol{flex:1;min-width:0;display:flex;flex-direction:column;min-height:0}
.convhd{display:flex;align-items:center;gap:12px;padding:8px 14px;border-bottom:1px solid var(--line);flex:none}
.chrom{color:#eaf2ff;letter-spacing:.16em;font-size:12px;text-shadow:0 0 10px rgba(157,107,255,.5)}
.sub{font-size:9px;letter-spacing:.12em;color:#6c6a86;text-transform:uppercase}
#thread{flex:1;min-height:0;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:11px}
.bub{max-width:86%;padding:9px 13px;border:1px solid var(--line);font-size:12.5px;line-height:1.55;white-space:pre-wrap;word-break:break-word;animation:bubin .18s ease-out}
.bub .who{font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:4px;opacity:.75}
.bub.you{align-self:flex-end;color:#e6f8ff;border-color:#214a5c;background:linear-gradient(180deg,rgba(34,225,255,.07),transparent)}
.bub.you .who{color:var(--cyan)}
.bub.atlas{align-self:flex-start;color:#e7dfce;border-color:#2c2848;background:#0d0b15}
.bub.atlas .who{color:var(--violet)}
.pend{color:var(--cyan);font-size:11.5px;letter-spacing:.04em}
.pend b{font-weight:400;color:var(--amber)}
.pend::after{content:"▍";margin-left:2px;animation:blink 1s steps(2) infinite}
.lab{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#6c6a86;padding:6px 12px 5px;border-bottom:1px solid var(--line);flex:none}
#brood{flex:none;max-height:46%;overflow-y:auto}
#ledger{flex:1;min-height:0;overflow-y:auto}
.arow{position:relative;display:flex;align-items:center;gap:9px;padding:7px 12px;border-bottom:1px solid #141225;cursor:pointer;overflow:hidden;transition:background .2s}
.arow:hover{background:#100e1c}
.arow.sel{background:#150f22}
.arow.st-working{animation:wpulse 1.6s ease-in-out infinite}
.arow.st-working::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(34,225,255,.10),transparent);background-size:200px 100%;animation:shimmer 1.5s linear infinite;pointer-events:none}
.arow.st-done.fresh{animation:flash 1.1s ease-out}
.arow.st-failed.fresh{animation:flashf 1.1s ease-out}
.sig{font-size:13px;flex:none;width:14px;text-align:center}
.st-working .sig{animation:sigp 1.1s ease-in-out infinite}
.aid{font-size:10px;color:#7e7c9a;flex:none;width:34px;letter-spacing:.03em}
.atask{flex:1;color:#cdd3e3;font-size:11.5px}
.atool{font-size:9px;width:58px;text-align:right;flex:none;color:var(--cyan);opacity:.85}
.ast{font-size:9px;width:54px;text-align:right;flex:none;text-transform:uppercase}
.acost{font-size:9px;width:40px;text-align:right;flex:none;color:#6c6a86}
.crow{display:flex;gap:9px;padding:6px 12px;border-bottom:1px solid #110f1f;font-size:11px}
.csha{color:var(--acid);flex:none;width:52px;opacity:.8}.csub{flex:1;color:#a6abc6}.cwhen{color:#56546e;flex:none;font-size:9px}
.empty{padding:18px 14px;color:#56546e;line-height:1.5}
#reply{flex:none;max-height:0;overflow:hidden;border-top:1px solid transparent;background:var(--panel)}
#reply.open{max-height:40vh;overflow-y:auto;border-top:1px solid var(--cyan);box-shadow:0 -10px 30px -18px var(--cyan)}
.rhd{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel)}
.rhd .rid{color:#eaf2ff;font-size:11px;letter-spacing:.12em}
.rx{margin-left:auto;cursor:pointer;color:#6c6a86;font-size:10px;border:1px solid var(--line);padding:2px 9px}
.rx:hover{color:var(--mag);border-color:var(--mag)}
.rtask{padding:9px 14px 4px;color:#8b90ab;font-size:11px;font-style:italic;border-bottom:1px solid #141225}
.rbody{padding:12px 14px 18px;color:#d8deec;font-size:12.5px;line-height:1.58;white-space:pre-wrap;word-break:break-word}
.bar{display:flex;align-items:center;gap:10px;padding:11px 16px;border-top:1px solid var(--line);background:#09080e;flex:none;z-index:2}
.bar .to{color:var(--violet);font-size:10px;letter-spacing:.12em;text-transform:uppercase;flex:none;text-shadow:0 0 8px rgba(157,107,255,.5)}
.bar input{flex:1;background:transparent;border:none;color:#e4e9f6;caret-color:var(--cyan);font-family:inherit;font-size:13.5px;outline:none}
.hint{font-size:10px;color:#56546e;letter-spacing:.1em;flex:none}
</style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute"><defs>
    <linearGradient id="sk" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#dfe6f5"/><stop offset=".45" stop-color="#9aa0c0"/><stop offset="1" stop-color="#221d33"/></linearGradient>
    <radialGradient id="so" cx=".5" cy=".4" r=".7"><stop offset="0" stop-color="#1a1730"/><stop offset="1" stop-color="#040308"/></radialGradient>
    <filter id="ng" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs></svg>

  <div class="mem"><span class="haz"></span><span class="nm">ATLAS // station</span><span class="dim">// orchestrator</span><span id="counts">0 working · 0 subagents</span></div>

  <div id="main">
    <div id="convcol">
      <div class="convhd">
        <svg id="eye" viewBox="0 0 120 132" width="44" height="48" style="flex:none;transform-origin:60px 70px;animation:hd 7s ease-in-out infinite">
          <path d="M60 6 C40 12 25 40 30 74 C33 104 48 123 60 123 C72 123 87 104 90 74 C95 40 80 12 60 6 Z" fill="url(#sk)" stroke="#6f7398" stroke-width=".8" opacity=".92"/>
          <g stroke="#5a5878" stroke-width="1.3" fill="none" opacity=".5"><path d="M33 44 Q60 54 87 44"/><path d="M32 64 Q60 76 88 64"/><path d="M34 84 Q60 95 86 84"/></g>
          <ellipse cx="60" cy="84" rx="18" ry="14" fill="url(#so)" stroke="#2a2742" stroke-width="1"/>
          <ellipse id="glow" cx="60" cy="84" rx="16" ry="12" fill="#22e1ff" opacity="0" filter="url(#ng)"/>
          <circle cx="60" cy="84" r="10.5" fill="#06060d"/><circle id="core" cx="60" cy="84" r="10.5" fill="#22e1ff" opacity=".14"/>
          <ellipse id="slit" cx="60" cy="84" rx="2.6" ry="8" fill="#22e1ff" filter="url(#ng)"/>
        </svg>
        <div><div class="chrom">ATLAS</div><div class="sub" id="status">overseer · idle</div></div>
      </div>
      <div id="thread"></div>
    </div>
    <div id="fleetcol">
      <div class="lab">⟦ the fleet — what ATLAS is running ⟧</div>
      <div id="brood"></div>
      <div class="lab" style="border-top:1px solid var(--line)">⟦ the ledger — what's been built ⟧</div>
      <div id="ledger"></div>
    </div>
  </div>

  <div id="reply"></div>

  <div class="bar">
    <span class="to">↳ to ATLAS</span>
    <input id="say" type="text" placeholder="tell ATLAS what you want — it runs the fleet…" autofocus/>
    <span class="hint">enter</span>
  </div>

<script>
(function(){
  var $=function(i){return document.getElementById(i)};
  var slit=$('slit'), glow=$('glow'), core=$('core');
  function esc(s){return String(s==null?'':s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
  var thread=[]; var agents=new Map(); var HIST={commits:[],runs:[]}; var SEL=null; var fresh=new Set();
  var COL={ "needs-you":"#ff2d95", "working":"#22e1ff", "done":"#49ff9e", "failed":"#ff4d4d", "interrupted":"#ffc24b" };
  var SIG={ "needs-you":"◉", "working":"⟁", "done":"◇", "failed":"⊗", "interrupted":"⏸" };
  var COND=[0x9d,0x6b,0xff], cur=[0x9d,0x6b,0xff], ACT=0;

  function lastPendingAtlas(){ for(var i=thread.length-1;i>=0;i--){ if(thread[i].role==="atlas"&&thread[i].pending) return thread[i]; } return null; }

  window.atlas.onFleet(function(m){
    if(!m) return;
    if(m.type==="agent"){
      if(m.id==="ATLAS"){
        agents.set("ATLAS", m);
        var pend=lastPendingAtlas();
        if(m.state==="working"){ if(pend){ pend.activity = m.lastTool ? ("running <b>"+esc(m.lastTool)+"</b>") : esc(m.summary||"thinking"); } $('status').textContent="overseer · working"; }
        else if(m.state==="done"||m.state==="failed"){ var txt=m.reply||m.summary||"(no reply)"; if(pend){ pend.text=txt; pend.pending=false; pend.activity=null; pend.cost=m.cost; } else { thread.push({role:"atlas",text:txt,cost:m.cost}); } $('status').textContent="overseer · idle"; }
        renderThread();
      } else {
        var prev=agents.get(m.id); agents.set(m.id, m);
        if((m.state==="done"||m.state==="failed") && (!prev||prev.state!==m.state)){ fresh.add(m.id); setTimeout(function(){ fresh.delete(m.id); renderBrood(); },1200); }
        renderBrood();
      }
      updateEye();
    } else if(m.type==="restored"){
      if(Array.isArray(m.agents)) for(var i=0;i<m.agents.length;i++){ var a=m.agents[i]; if(a&&a.id){ agents.set(a.id,a); if(a.id==="ATLAS" && (a.reply||a.summary)) thread.push({role:"atlas",text:a.reply||a.summary,cost:a.cost,restored:true}); } }
      renderThread(); renderBrood(); updateEye();
    } else if(m.type==="history"){ HIST={ commits:(m.commits||[]), runs:(m.runs||[]) }; renderLedger(); }
  });

  function hx(h){h=h.replace('#','');return[parseInt(h.substr(0,2),16),parseInt(h.substr(2,2),16),parseInt(h.substr(4,2),16)];}

  function renderThread(){
    var th=$('thread');
    th.innerHTML = thread.length ? thread.map(function(t){
      var who = t.role==="you" ? "you" : "ATLAS";
      var inner = (t.role==="atlas" && t.pending) ? ('<span class="pend">'+(t.activity||"thinking")+' </span>') : (esc(t.text||"") + (t.cost!=null?('<span class="dim" style="font-size:9px"> · $'+Number(t.cost).toFixed(2)+'</span>'):''));
      return '<div class="bub '+t.role+(t.pending?' pending':'')+'"><div class="who">'+who+(t.restored?' · earlier':'')+'</div>'+inner+'</div>';
    }).join('') : '<div class="empty">Tell ATLAS what you want. It decides what to do, spawns and manages subagents to do it, and reports back. You watch the fleet work on the right — you never have to command them yourself.</div>';
    th.scrollTop = th.scrollHeight;
  }

  function rowOf(a){ var col=COL[a.state]||"#6c6a86"; var sel=(SEL&&SEL.kind==="agent"&&SEL.id===a.id)?" sel":""; var fr=fresh.has(a.id)?" fresh":"";
    return '<div class="arow st-'+a.state+sel+fr+'" data-k="agent" data-id="'+esc(a.id)+'"><span class="sig" style="color:'+col+';text-shadow:0 0 8px '+col+'">'+(SIG[a.state]||"·")+'</span><span class="aid">'+esc(a.id)+'</span><span class="atask ell">'+esc(a.task||a.summary||"")+'</span><span class="atool ell">'+esc(a.lastTool||"")+'</span><span class="ast" style="color:'+col+'">'+esc(a.state)+'</span><span class="acost">'+(a.cost!=null?("$"+Number(a.cost).toFixed(2)):"")+'</span></div>'; }

  function renderBrood(){
    var list=Array.from(agents.values()).filter(function(a){return a.id!=="ATLAS"});
    var ord={working:0,"needs-you":1,interrupted:2,done:3,failed:4};
    list.sort(function(a,b){return (ord[a.state]==null?9:ord[a.state])-(ord[b.state]==null?9:ord[b.state]);});
    $('brood').innerHTML = list.length ? list.map(rowOf).join("") : '<div class="empty">ATLAS hasn\'t spawned any subagents yet.</div>';
  }

  function renderLedger(){
    var runs=HIST.runs.slice().reverse(); var html="";
    if(runs.length){ html+=runs.map(function(r,i){ var col=COL[r.state]||"#6c6a86";
      return '<div class="arow st-'+r.state+'" data-k="run" data-id="'+i+'"><span class="sig" style="color:'+col+';text-shadow:0 0 8px '+col+'">'+(SIG[r.state]||"·")+'</span><span class="aid">'+esc(r.agentId||"")+'</span><span class="atask ell">'+esc(r.task||"")+'</span><span class="atool ell" style="color:#9d6bff">'+esc(r.mode||"")+'</span><span class="acost">'+(r.cost!=null?("$"+Number(r.cost).toFixed(2)):"")+'</span></div>'; }).join(""); }
    if(HIST.commits.length){ html+='<div class="lab" style="border-top:1px solid var(--line)">⟦ git — the build ⟧</div>'+HIST.commits.map(function(c){ return '<div class="crow"><span class="csha">'+esc(c.sha)+'</span><span class="csub ell">'+esc(c.subject)+'</span><span class="cwhen">'+esc(c.when)+'</span></div>'; }).join(""); }
    $('ledger').innerHTML = html || '<div class="empty">nothing recorded yet.</div>';
  }

  function updateEye(){
    var list=Array.from(agents.values());
    var work=list.filter(function(a){return a.state==="working"}).length;
    var need=list.filter(function(a){return a.state==="needs-you"}).length;
    var subs=list.filter(function(a){return a.id!=="ATLAS"}).length;
    var cc = need?"#ff2d95" : work?"#22e1ff" : "#9d6bff";
    COND=hx(cc); ACT=Math.min(1, work/3 + need*0.4);
    $('counts').innerHTML="<b>"+work+"</b> working · "+subs+" subagents";
  }

  // read-only inspect of a subagent / run
  function select(kind,id){ SEL={kind:kind,id:id}; renderBrood(); renderReply(); }
  function renderReply(){
    var box=$('reply'); if(!SEL){ box.className=""; box.innerHTML=""; return; }
    var rid="",state="",cost="",task="",body="",col="#d8deec",branch="";
    if(SEL.kind==="agent"){ var a=agents.get(SEL.id); if(!a){box.className="";return;} rid=a.id; state=a.state; col=COL[a.state]||"#d8deec"; cost=(a.cost!=null?("$"+Number(a.cost).toFixed(2)):""); task=a.task||""; branch=a.branch||""; body=a.reply||a.summary||(a.state==="working"?"◌ working — "+(a.lastTool||"thinking")+" …":"(no output)"); }
    else if(SEL.kind==="run"){ var r=HIST.runs.slice().reverse()[SEL.id]; if(!r){box.className="";return;} rid=r.agentId||"run"; state=r.state; col=COL[r.state]||"#d8deec"; cost=(r.cost!=null?("$"+Number(r.cost).toFixed(2)):""); task=r.task||""; branch=r.branch||""; body=r.summary||"(summary only)"; }
    box.className="open";
    box.innerHTML='<div class="rhd"><span class="rid">'+esc(rid)+'</span><span style="color:'+col+';font-size:10px;text-transform:uppercase;text-shadow:0 0 8px '+col+'">'+esc(state)+'</span>'+(branch?'<span class="dim" style="font-size:10px">⟦'+esc(branch)+'⟧</span>':'')+'<span class="dim" style="font-size:10px">'+esc(cost)+'</span><span class="dim" style="font-size:9px;margin-left:4px">subagent · read-only</span><span class="rx" id="rx">close</span></div>'
      +(task?'<div class="rtask">▸ '+esc(task)+'</div>':'')+'<div class="rbody">'+esc(body)+'</div>';
    var rx=$('rx'); if(rx) rx.addEventListener('click',function(e){ e.stopPropagation(); SEL=null; renderBrood(); renderReply(); });
  }
  function onClick(e){ var row=e.target.closest('[data-k]'); if(!row) return; var k=row.getAttribute('data-k'); select(k, k==="run"?Number(row.getAttribute('data-id')):row.getAttribute('data-id')); }
  $('brood').addEventListener('click', onClick); $('ledger').addEventListener('click', onClick);

  function say(text){ thread.push({role:"you",text:text}); thread.push({role:"atlas",text:"",pending:true,activity:"thinking"}); window.atlas.say(text); renderThread(); }
  $('say').addEventListener('keydown',function(e){ if(e.key==="Enter" && $('say').value.trim()){ say($('say').value.trim()); $('say').value=""; }});

  renderThread(); renderBrood(); renderLedger();
  var bt=0;(function loop(){ bt += 0.018 + ACT*0.07; for(var i=0;i<3;i++)cur[i]+=(COND[i]-cur[i])*0.07; var c='rgb('+(cur[0]|0)+','+(cur[1]|0)+','+(cur[2]|0)+')';
    var p=Math.sin(bt); if(slit){slit.setAttribute('fill',c);slit.setAttribute('ry',(8+ p*0.7 + ACT*2.2).toFixed(2));slit.setAttribute('rx',(2.6+ACT*0.8).toFixed(2));}
    if(core)core.setAttribute('fill',c);
    if(glow){glow.setAttribute('fill',c);glow.setAttribute('opacity',(0.08 + ACT*0.34 + Math.abs(p)*(0.06+ACT*0.12)).toFixed(3));}
    requestAnimationFrame(loop); })();
  $('say').focus();
})();
</script>
</body>
</html>
